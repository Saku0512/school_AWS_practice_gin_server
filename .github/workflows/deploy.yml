name: Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: |
          go mod tidy
          GOOS=linux GOARCH=amd64 go build -o app .

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" >> ~/.ssh/ec2_key
          chmod 600 ~/.ssh/ec2_key
          ssh-keygen -H ${{ secrets.ec2_HOST }} >> ~/.ssh/known_hosts

      - name: Upload binary
        run: |
          scp -i ~/.ssh/ec2_key ./app ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST}}:home/${{ secrets.EC2_USER }}/app

      - name: Restart app on EC2
        run: |
          ssh -i ~/.ssh/ec2_key ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST}} << 'EOF'
            chmod +x /home/ubuntu/app
            sudo systemctl restart ginapp
            sudo systemctl status ginapp --no-paper
          EOF
